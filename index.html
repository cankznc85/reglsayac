<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum 💞</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --soft-pink: #fbcfe8;
            --accent-pink: #f472b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--navy);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Arka plandaki sonsuz yazılar */
        .bg-text-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            opacity: 0.07; /* Yazıların silikliği */
            user-select: none;
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
        }

        .bg-text-container span {
            font-size: 11px;
            padding: 8px;
            white-space: nowrap;
            color: white;
        }

        .main-card {
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(251, 207, 232, 0.15);
            padding: 3rem 2rem;
            border-radius: 40px;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-weight: 400;
            margin-bottom: 2rem;
            font-size: 1.6rem;
            color: var(--soft-pink);
            letter-spacing: 1px;
        }

        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .number {
            font-size: 2.8rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 15px rgba(244, 114, 182, 0.3);
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-pink);
            margin-top: 5px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .heart-icon {
            font-size: 1.2rem;
            margin-top: 20px;
            display: block;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="bg-text-container" id="bgContainer"></div>

    <div class="main-card">
        <h1>Geri Sayım başladı 💞</h1>
        
        <div class="countdown-wrapper">
            <div class="box">
                <span class="number" id="days">00</span>
                <span class="label">Gün</span>
            </div>
            <div class="box">
                <span class="number" id="hours">00</span>
                <span class="label">Saat</span>
            </div>
            <div class="box">
                <span class="number" id="minutes">00</span>
                <span class="label">Dakika</span>
            </div>
            <div class="box">
                <span class="number" id="seconds">00</span>
                <span class="label">Saniye</span>
            </div>
        </div>
        <span class="heart-icon">🌸</span>
    </div>

    <script>
        // 1. ARKA PLAN YAZILARI OLUŞTURMA
        const bgContainer = document.getElementById('bgContainer');
        const text = "seni seviyorum ";
        // Ekranı kaplayacak kadar yazı ekle
        for (let i = 0; i < 400; i++) {
            const span = document.createElement('span');
            span.innerText = text;
            bgContainer.appendChild(span);
        }

        // 2. KALICI SAYAÇ MANTIĞI
        // Tarayıcı hafızasında bitiş tarihi var mı bak, yoksa yeni oluştur
        let endTime = localStorage.getItem('periodCountdownTarget');

        if (!endTime) {
            // Şu andan 7 gün sonrası (7 gün * 24sa * 60dk * 60sn * 1000ms)
            endTime = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);
            localStorage.setItem('periodCountdownTarget', endTime);
        }

        function updateTimer() {
            const now = new Date().getTime();
            const diff = endTime - now;

            if (diff <= 0) {
                document.querySelector(".main-card").innerHTML = "<h1>Zamanı Geldi 🌸</h1><p style='color:white'>Her zaman yanındayım.</p>";
                clearInterval(interval);
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        const interval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
