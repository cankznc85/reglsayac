<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f; /* Derin Lacivert */
            --soft-pink: #fbcfe8; /* Yumuşak Pastel Pembe */
            --accent-pink: #f472b6; /* Vurgu Pembesi */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--navy);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Arka plandaki "Seni Seviyorum" yazıları */
        body::before {
            content: "seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum seni seviyorum";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.05); /* Çok silik beyaz */
            line-height: 2.5;
            word-spacing: 15px;
            pointer-events: none;
            display: block;
            overflow: hidden;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 207, 232, 0.2); /* Pastel pembe çerçeve */
            padding: 3rem 2rem;
            border-radius: 40px;
            text-align: center;
            z-index: 1;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            font-weight: 400;
            margin-bottom: 2.5rem;
            font-size: 1.5rem;
            color: var(--soft-pink);
            letter-spacing: 1px;
        }

        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }

        .number {
            font-size: 2.5rem;
            font-weight: 600;
            color: white;
            line-height: 1;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--accent-pink);
            margin-top: 8px;
            font-weight: 600;
        }

        /* Küçük süsleme */
        .divider {
            width: 50px;
            height: 2px;
            background: var(--soft-pink);
            margin: 20px auto;
            border-radius: 2px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>Geri Sayım başladı 💞</h1>
        
        <div class="countdown-wrapper">
            <div class="box">
                <span class="number" id="days">00</span>
                <span class="label">Gün</span>
            </div>
            <div class="box">
                <span class="number" id="hours">00</span>
                <span class="label">Saat</span>
            </div>
            <div class="box">
                <span class="number" id="minutes">00</span>
                <span class="label">Dak</span>
            </div>
            <div class="box">
                <span class="number" id="seconds">00</span>
                <span class="label">Sn</span>
            </div>
        </div>

        <div class="divider"></div>
    </div>

    <script>
        // Hedef: Şu andan itibaren 7 gün
        const targetDate = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

            if (diff < 0) {
                clearInterval(interval);
                document.querySelector(".main-card").innerHTML = "<h1>Zamanı geldi 🌸</h1>";
            }
        }

        const interval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
